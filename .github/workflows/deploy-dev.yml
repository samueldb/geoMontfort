name: Deploy dev preview

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate build secrets
        env:
          REACT_APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.REACT_APP_MAPBOX_ACCESS_TOKEN }}
          REACT_APP_MAPTILER_KEY: ${{ secrets.REACT_APP_MAPTILER_KEY }}
        run: |
          test -n "$REACT_APP_MAPBOX_ACCESS_TOKEN" || (echo "Missing secret: REACT_APP_MAPBOX_ACCESS_TOKEN" && exit 1)
          test -n "$REACT_APP_MAPTILER_KEY" || (echo "Missing secret: REACT_APP_MAPTILER_KEY" && exit 1)

      - name: Build app
        env:
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          REACT_APP_MAPBOX_ACCESS_TOKEN: ${{ secrets.REACT_APP_MAPBOX_ACCESS_TOKEN }}
          REACT_APP_MAPTILER_KEY: ${{ secrets.REACT_APP_MAPTILER_KEY }}
        run: npm run build

      - name: Ensure hidden files exist for Pages publish
        run: touch build/.nojekyll

      - name: Publish preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build
          destination_dir: preview-site
          keep_files: true
          commit_message: "Deploy dev preview: ${{ github.sha }}"
